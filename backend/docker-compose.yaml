services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: npm start

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=codepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6979:6979"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass jesus_is_king --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jesus_is_king", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: locpal
  postgres_data: {}
